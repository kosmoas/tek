<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TEK Dashboard</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111827;
      color: #f9fafb;
      margin: 0;
      padding: 24px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    .card {
      background: #1f2937;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.25);
    }

    h1, h2 {
      margin-top: 0;
    }

    .row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    button {
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      cursor: pointer;
      font-size: 14px;
    }

    button:hover {
      background: #1d4ed8;
    }

    input {
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #374151;
      background: #111827;
      color: white;
      width: 100%;
      max-width: 320px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      margin-top: 16px;
    }

    .stat {
      background: #111827;
      padding: 14px;
      border-radius: 12px;
    }

    .label {
      font-size: 12px;
      color: #9ca3af;
      margin-bottom: 6px;
    }

    .value {
      font-size: 20px;
      font-weight: bold;
    }

    pre {
      background: #0b1220;
      padding: 12px;
      border-radius: 12px;
      overflow-x: auto;
      white-space: pre-wrap;
    }

    .muted {
      color: #9ca3af;
      font-size: 14px;
    }
    .select {
  padding: 10px;
  border-radius: 10px;
  border: 1px solid #374151;
  background: #111827;
  color: white;
}
  </style>
</head>
<body>
  <div class="container">
    <h1>TEK Tesla Dashboard</h1>
    <p class="muted">Use sim routes now. Switch to Tesla routes later.</p>

   <div class="card">
  <h2>Vehicle Lookup</h2>
  <div class="row">
    <label for="modeSelect">Mode:</label>
    <select id="modeSelect">
      <option value="sim">Sim</option>
      <option value="tesla">Tesla</option>
    </select>
  </div>

  <div class="row" style="margin-top: 12px;">
    <input id="vehicleId" type="text" value="1" placeholder="Enter vehicle ID" />
    <button id="loadSummaryBtn">Load Summary</button>
  </div>
</div>

<div class="card">
  <h2>Vehicle Summary</h2>
  <div class="grid">
    <div class="stat">
      <div class="label">Name</div>
      <div class="value" id="displayName">-</div>
    </div>
    <div class="stat">
      <div class="label">Battery</div>
      <div class="value" id="batteryLevel">-</div>
    </div>
    <div class="stat">
      <div class="label">State</div>
      <div class="value" id="vehicleState">-</div>
    </div>
    <div class="stat">
      <div class="label">Range</div>
      <div class="value" id="batteryRange">-</div>
    </div>
    <div class="stat">
      <div class="label">Locked</div>
      <div class="value" id="lockStatus">-</div>
    </div>
  </div>
</div>

    <div class="card">
      <h2>Sim Commands</h2>
      <div class="row">
        <button id="lockBtn">Lock</button>
        <button id="unlockBtn">Unlock</button>
        <button id="toggleLockBtn">Toggle Lock</button>
        <button id="drainBtn">Drain Battery</button>
        <button id="chargeBtn">Charge Battery</button>
      </div>
    </div>

    <div class="card">
      <h2>Response</h2>
      <pre id="output">No requests yet.</pre>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
